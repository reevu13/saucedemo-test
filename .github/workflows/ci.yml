name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm test
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        TIMEOUT: ${{ secrets.TIMEOUT }}
        STANDARD_USER: ${{ secrets.STANDARD_USER }}
        LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
        PROBLEM_USER: ${{ secrets.PROBLEM_USER }}
        PERFORMANCE_GLITCH_USER: ${{ secrets.PERFORMANCE_GLITCH_USER }}
        ERROR_USER: ${{ secrets.ERROR_USER }}
        PASSWORD: ${{ secrets.PASSWORD }}

    - name: Upload Playwright test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: reports/html/
        retention-days: 14

    - name: Deploy Playwright report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./reports/html
